basePath: /
definitions:
  api.HealthCheckErrorResponse:
    properties:
      error:
        example: DB_UNAVAILABLE
        type: string
      status:
        example: unavailable
        type: string
    type: object
  api.HealthCheckResponse:
    properties:
      status:
        example: ok
        type: string
    type: object
  models.Booking:
    properties:
      created_at:
        example: "2026-06-07T15:04:05Z"
        format: date-time
        type: string
      id:
        example: e2f1c3a8-7d4b-11ec-90d6-0242ac120003
        type: string
      status:
        allOf:
        - $ref: '#/definitions/models.bookingStatus'
        example: pending
      ticketId:
        example: t12345
        type: string
      updated_at:
        example: "2026-06-07T15:04:05Z"
        format: date-time
        type: string
      userId:
        example: u12345
        type: string
    type: object
  models.CreateEventRequest:
    properties:
      dateTime:
        example: "2026-06-07T15:04:05Z"
        format: date-time
        type: string
      description:
        example: Quarterly planning meeting
        type: string
      duration:
        example: 60
        type: integer
      location:
        example: Conference Room A
        type: string
      title:
        example: Board Meeting
        maxLength: 50
        minLength: 3
        type: string
    required:
    - dateTime
    - location
    - title
    type: object
  models.CreateTicketRequest:
    properties:
      price:
        example: 99.99
        type: number
      quantity:
        example: 2
        type: integer
      type:
        allOf:
        - $ref: '#/definitions/models.TicketType'
        example: vip
    required:
    - price
    - quantity
    type: object
  models.ErrorBadRequest:
    properties:
      error:
        example: PAYLOAD_NOT_VALID
        type: string
      message:
        example: Bad Request
        type: string
    type: object
  models.ErrorConflict:
    properties:
      error:
        example: EMAIL_ALREADY_EXISTS
        type: string
      message:
        example: Conflict
        type: string
    type: object
  models.ErrorForbidden:
    properties:
      error:
        example: ACCESS_DENIED
        type: string
      message:
        example: Forbidden
        type: string
    type: object
  models.ErrorInternalServer:
    properties:
      error:
        example: UNKNOWN_ERROR
        type: string
      message:
        example: Internal Server Error
        type: string
    type: object
  models.ErrorNotFound:
    properties:
      error:
        example: EVENT_NOT_FOUND
        type: string
      message:
        example: Not Found
        type: string
    type: object
  models.ErrorUnauthorized:
    properties:
      error:
        example: INVALID_CREDENTIALS
        type: string
      message:
        example: Unauthorized
        type: string
    type: object
  models.ErrorValidation:
    properties:
      error:
        example: VALIDATION_FAILED
        type: string
      fields:
        additionalProperties:
          type: string
        example:
          '{"email"': ' "invalid email format"}'
        type: object
      message:
        example: Validation Failed
        type: string
    type: object
  models.Event:
    properties:
      created_at:
        example: "2026-06-07T15:04:05Z"
        format: date-time
        type: string
      dateTime:
        example: "2026-06-07T15:04:05Z"
        format: date-time
        type: string
      description:
        example: Quarterly planning meeting
        type: string
      duration:
        description: Duration in minutes
        example: 60
        type: integer
      host:
        $ref: '#/definitions/models.Host'
      id:
        example: e2f1c3a8-7d4b-11ec-90d6-0242ac120003
        type: string
      location:
        example: Conference Room A
        type: string
      ticketCount:
        type: integer
      tickets:
        items:
          $ref: '#/definitions/models.Ticket'
        type: array
      title:
        example: Board Meeting
        type: string
      updated_at:
        example: "2026-06-07T15:04:05Z"
        format: date-time
        type: string
      userId:
        example: u12345
        type: string
      version:
        example: 1
        type: integer
    type: object
  models.EventDeleteSuccess:
    properties:
      message:
        example: Event deleted successfully
        type: string
    type: object
  models.EventListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/models.Event'
        type: array
      message:
        type: string
    type: object
  models.EventResponse:
    properties:
      data:
        $ref: '#/definitions/models.Event'
      message:
        type: string
    type: object
  models.Host:
    properties:
      email:
        example: john@example.com
        type: string
      id:
        example: u12345
        type: string
      username:
        example: john
        type: string
    type: object
  models.LoginResponse:
    properties:
      message:
        example: user logged in successfully
        type: string
      token:
        example: eyJhbGci...
        type: string
    type: object
  models.LogoutResponse:
    properties:
      message:
        example: user logged out successfully
        type: string
    type: object
  models.PatchEventRequest:
    properties:
      dateTime:
        example: "2026-07-01T09:00:00Z"
        format: date-time
        type: string
      description:
        example: Updated description
        type: string
      duration:
        example: 60
        type: integer
      location:
        example: Room B
        type: string
      title:
        example: Board Meeting
        maxLength: 50
        minLength: 3
        type: string
    type: object
  models.Ticket:
    properties:
      bookings:
        items:
          $ref: '#/definitions/models.Booking'
        type: array
      created_at:
        example: "2026-06-07T15:04:05Z"
        format: date-time
        type: string
      eventId:
        example: e12345
        type: string
      id:
        example: e2f1c3a8-7d4b-11ec-90d6-0242ac120003
        type: string
      price:
        example: 99.99
        type: number
      quantity:
        example: 2
        type: integer
      type:
        allOf:
        - $ref: '#/definitions/models.TicketType'
        example: VIP
      updated_at:
        example: "2026-06-07T15:04:05Z"
        format: date-time
        type: string
      userId:
        example: u12345
        type: string
    type: object
  models.TicketResponse:
    properties:
      data:
        $ref: '#/definitions/models.Ticket'
      message:
        type: string
    type: object
  models.TicketType:
    enum:
    - vip
    - general
    type: string
    x-enum-varnames:
    - TicketTypeVIP
    - TicketTypeGeneral
  models.User:
    properties:
      email:
        example: user@example.com
        type: string
      id:
        example: u12345
        type: string
      password:
        example: P@ssw0rd!
        minLength: 8
        type: string
      username:
        example: johndoe
        maxLength: 20
        minLength: 3
        type: string
    required:
    - email
    - password
    type: object
  models.bookingStatus:
    enum:
    - pending
    - confirmed
    - cancelled
    type: string
    x-enum-varnames:
    - BookingStatusPending
    - BookingStatusConfirmed
    - BookingStatusCancelled
host: localhost:8080
info:
  contact: {}
  description: API for booking events
  title: Booking Event API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login with email and password, returns access token
      parameters:
      - description: Login credentials (email and password)
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/models.User'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.LoginResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorUnauthorized'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/models.ErrorValidation'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorInternalServer'
      summary: Authenticate user
      tags:
      - Auth
  /auth/logout:
    post:
      description: Invalidate refresh token and clear cookie
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.LogoutResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorUnauthorized'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorInternalServer'
      summary: Logout user
      tags:
      - Auth
  /auth/refresh:
    post:
      description: Exchange refresh cookie for a new access token
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.LoginResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorUnauthorized'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorInternalServer'
      summary: Refresh access token
      tags:
      - Auth
  /auth/signup:
    post:
      consumes:
      - application/json
      description: Create a new user account
      parameters:
      - description: User signup payload
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/models.User'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.User'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/models.ErrorConflict'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/models.ErrorValidation'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorInternalServer'
      summary: Register a new user
      tags:
      - Auth
  /events:
    get:
      description: Get all events
      parameters:
      - description: Search
        in: query
        name: search
        type: string
      - description: Location
        in: query
        name: location
        type: string
      - description: Start Date
        in: query
        name: from
        type: string
      - description: End Date
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.EventListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorInternalServer'
      summary: List events
      tags:
      - Events
    post:
      consumes:
      - application/json
      description: Create a new event (authenticated)
      parameters:
      - description: Event payload
        in: body
        name: event
        required: true
        schema:
          $ref: '#/definitions/models.CreateEventRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Event'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorUnauthorized'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/models.ErrorBadRequest'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorInternalServer'
      security:
      - BearerAuth: []
      summary: Create an event
      tags:
      - Events
  /events/{id}:
    delete:
      description: Delete an event by ID (authenticated, owner only)
      parameters:
      - description: Event ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.EventDeleteSuccess'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorUnauthorized'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.ErrorForbidden'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/models.ErrorBadRequest'
      security:
      - BearerAuth: []
      summary: Delete an event
      tags:
      - Events
    get:
      description: Get an event by its ID
      parameters:
      - description: Event ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.EventResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorNotFound'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorInternalServer'
      summary: Get event by ID
      tags:
      - Events
    put:
      consumes:
      - application/json
      description: Update an existing event (authenticated, owner only)
      parameters:
      - description: Event ID
        in: path
        name: id
        required: true
        type: string
      - description: Patch payload
        in: body
        name: event
        required: true
        schema:
          $ref: '#/definitions/models.PatchEventRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Event'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorUnauthorized'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.ErrorForbidden'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorNotFound'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/models.ErrorBadRequest'
      security:
      - BearerAuth: []
      summary: Update an event
      tags:
      - Events
  /events/{id}/tickets:
    post:
      consumes:
      - application/json
      description: Create a new ticket (authenticated)
      parameters:
      - description: Event ID
        in: path
        name: id
        required: true
        type: string
      - description: Ticket payload
        in: body
        name: ticket
        required: true
        schema:
          $ref: '#/definitions/models.CreateTicketRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.TicketResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorBadRequest'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/models.ErrorBadRequest'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorInternalServer'
      security:
      - BearerAuth: []
      summary: Create a ticket
      tags:
      - Events
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.HealthCheckResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/api.HealthCheckErrorResponse'
      security:
      - BearerAuth: []
      tags:
      - Health
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
